<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>切断履歴 UI案</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d0d14;font-family:'Space Grotesk','Noto Sans JP',sans-serif;color:#e0e0f0;padding:20px;min-height:100vh;}

  /* ─── 比較用ラベル ─── */
  .compare-wrap{display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1100px;margin:0 auto;}
  .panel-label{font-size:11px;font-weight:700;letter-spacing:.14em;color:#6b7280;text-transform:uppercase;margin-bottom:12px;padding-left:2px;}

  /* ══ 案A: NEON GRID ══ */
  .panelA{background:#11111c;border:1px solid #2a2a3c;border-radius:12px;padding:20px;position:relative;overflow:hidden;}
  .panelA::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(107,70,255,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(107,70,255,.04) 40px);pointer-events:none;}

  /* tabs */
  .tabs-a{display:flex;gap:0;border-bottom:1px solid #2a2a3c;margin-bottom:20px;position:relative;z-index:1;}
  .tab-a{padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:.06em;color:#5a5a78;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;position:relative;top:1px;}
  .tab-a.active{color:#a78bfa;border-bottom-color:#a78bfa;}
  .tab-a.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#a78bfa,transparent);}

  /* header row */
  .hi-hd-a{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1;}
  .hi-title-a{font-size:13px;font-weight:700;letter-spacing:.1em;color:#a78bfa;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
  .hi-title-a::before{content:'';width:3px;height:14px;background:linear-gradient(180deg,#a78bfa,#6d28d9);border-radius:2px;}

  /* filter chips */
  .chips-a{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;position:relative;z-index:1;}
  .chip-a{padding:5px 14px;font-size:11px;font-weight:700;border-radius:4px;cursor:pointer;background:transparent;border:1px solid #2e2e44;color:#6b7280;letter-spacing:.06em;transition:.15s;font-family:inherit;}
  .chip-a.on{background:rgba(167,139,250,.12);border-color:#7c3aed;color:#c4b5fd;box-shadow:0 0 8px rgba(124,58,237,.3);}
  .chip-a:hover:not(.on){border-color:#4a4a64;color:#9ca3af;}

  /* sort row */
  .sort-row-a{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative;z-index:1;}
  .count-a{font-size:10px;font-weight:700;letter-spacing:.1em;color:#4a4a64;text-transform:uppercase;}
  .count-a span{color:#7c3aed;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;}
  .sort-a{font-size:11px;font-weight:700;color:#5a5a78;background:transparent;border:1px solid #2e2e44;border-radius:4px;padding:5px 10px;color:#8888a8;cursor:pointer;font-family:inherit;letter-spacing:.04em;}

  /* card */
  .card-a{background:#161620;border:1px solid #2a2a3c;border-left:3px solid #7c3aed;border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:8px;position:relative;z-index:1;transition:.15s;}
  .card-a:hover{background:#1c1c28;border-left-color:#a78bfa;box-shadow:0 0 16px rgba(124,58,237,.15);}
  .card-a-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .card-a-client{font-size:12px;font-weight:700;color:#e0e0f0;letter-spacing:.04em;}
  .card-a-right{display:flex;align-items:center;gap:10px;}
  .card-a-date{font-size:10px;font-weight:600;letter-spacing:.08em;color:#4a4a64;font-variant-numeric:tabular-nums;}
  .del-btn-a{font-size:9px;font-weight:700;letter-spacing:.08em;color:#3f3f5c;background:transparent;border:1px solid #2a2a3c;border-radius:3px;padding:3px 8px;cursor:pointer;font-family:inherit;transition:.15s;}
  .del-btn-a:hover{color:#f87171;border-color:#7f1d1d;}
  .card-a-tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .tag-a{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;letter-spacing:.04em;font-variant-numeric:tabular-nums;}
  .tag-a.type{background:rgba(124,58,237,.18);color:#a78bfa;border:1px solid rgba(124,58,237,.3);}
  .tag-a.spec{background:#1a1a28;color:#8b8ba8;border:1px solid #2a2a3c;font-family:'Space Grotesk',monospace;}
  .tag-a.data{background:transparent;color:#4a4a64;font-size:10px;}
  .tag-a.remnant{background:rgba(74,222,128,.08);color:#4ade80;border:1px solid rgba(74,222,128,.2);}

  /* ══ 案B: SLEEK MINIMAL ══ */
  .panelB{background:#f9f9fc;border:1px solid #e5e7eb;border-radius:12px;padding:20px;}

  .tabs-b{display:flex;gap:0;background:#f0f0f6;border-radius:8px;padding:3px;margin-bottom:20px;}
  .tab-b{flex:1;padding:8px;font-size:12px;font-weight:700;letter-spacing:.04em;color:#9ca3af;cursor:pointer;border-radius:6px;text-align:center;transition:.15s;}
  .tab-b.active{background:#fff;color:#6b46ff;box-shadow:0 1px 4px rgba(0,0,0,.08);}

  .hi-hd-b{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .hi-title-b{font-size:11px;font-weight:700;letter-spacing:.12em;color:#9ca3af;text-transform:uppercase;}

  .chips-b{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .chip-b{padding:6px 14px;font-size:12px;font-weight:600;border-radius:99px;cursor:pointer;background:#fff;border:1.5px solid #e5e7eb;color:#6b7280;transition:.15s;font-family:inherit;}
  .chip-b.on{background:#6b46ff;border-color:#6b46ff;color:#fff;box-shadow:0 2px 8px rgba(107,70,255,.3);}

  .sort-row-b{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .count-b{font-size:11px;color:#9ca3af;}
  .count-b strong{color:#111;font-size:15px;}
  .sort-b{font-size:11px;font-weight:600;color:#6b7280;background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit;}

  .card-b{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:.15s;}
  .card-b:hover{border-color:#c4b5fd;box-shadow:0 4px 16px rgba(107,70,255,.08);}
  .card-b-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .card-b-client{font-size:13px;font-weight:700;color:#111827;}
  .card-b-date{font-size:11px;color:#9ca3af;}
  .del-btn-b{font-size:11px;font-weight:600;color:#d1d5db;background:transparent;border:none;cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:4px;transition:.15s;}
  .del-btn-b:hover{color:#ef4444;background:#fef2f2;}
  .card-b-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag-b{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
  .tag-b.type{background:#ede9fe;color:#6d28d9;}
  .tag-b.spec{background:#f3f4f6;color:#374151;font-family:'Space Grotesk',monospace;}
  .tag-b.data{color:#9ca3af;font-size:11px;}
  .tag-b.remnant{background:#f0fdf4;color:#16a34a;}

  /* title bar */
  h2{font-size:11px;letter-spacing:.12em;font-weight:700;color:#4a4a64;text-transform:uppercase;margin-bottom:28px;text-align:center;}
</style>
</head>
<body>
<h2>切断履歴 UI リデザイン案</h2>
<div class="compare-wrap">

  <!-- 案A: Dark Game-Tech -->
  <div>
    <div class="panel-label">案 A ── DARK GAME-TECH</div>
    <div class="panelA">
      <div class="tabs-a">
        <div class="tab-a active">切断履歴</div>
        <div class="tab-a">残材在庫</div>
      </div>
      <div class="hi-hd-a">
        <div class="hi-title-a">切断履歴</div>
      </div>
      <div class="chips-a">
        <button class="chip-a on">今月</button>
        <button class="chip-a">先月</button>
        <button class="chip-a">3ヶ月</button>
        <button class="chip-a">今年</button>
      </div>
      <div class="sort-row-a">
        <div class="count-a"><span>1</span> RECORDS</div>
        <select class="sort-a"><option>新しい順</option></select>
      </div>
      <div class="card-a">
        <div class="card-a-hd">
          <div class="card-a-client">顧客未設定</div>
          <div class="card-a-right">
            <div class="card-a-date">2026/04/12</div>
            <button class="del-btn-a">DEL</button>
          </div>
        </div>
        <div class="card-a-tags">
          <span class="tag-a type">等辺山形鋼</span>
          <span class="tag-a spec">L-25×25×3</span>
          <span class="tag-a data">工事: —</span>
          <span class="tag-a data">納期: —</span>
          <span class="tag-a remnant">端材 1本</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 案B: Light Sleek -->
  <div>
    <div class="panel-label">案 B ── LIGHT SLEEK</div>
    <div class="panelB">
      <div class="tabs-b">
        <div class="tab-b active">切断履歴</div>
        <div class="tab-b">残材在庫</div>
      </div>
      <div class="hi-hd-b">
        <div class="hi-title-b">切断履歴</div>
      </div>
      <div class="chips-b">
        <button class="chip-b on">今月</button>
        <button class="chip-b">先月</button>
        <button class="chip-b">3ヶ月</button>
        <button class="chip-b">今年</button>
      </div>
      <div class="sort-row-b">
        <div class="count-b"><strong>1</strong> 件</div>
        <select class="sort-b"><option>新しい順</option></select>
      </div>
      <div class="card-b">
        <div class="card-b-hd">
          <div class="card-b-client">顧客未設定</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="card-b-date">2026/4/12</div>
            <button class="del-btn-b">削除</button>
          </div>
        </div>
        <div class="card-b-tags">
          <span class="tag-b type">等辺山形鋼</span>
          <span class="tag-b spec">L-25×25×3</span>
          <span class="tag-b data">工事: —</span>
          <span class="tag-b data">納期: —</span>
          <span class="tag-b remnant">端材 1本</span>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
